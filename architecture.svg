<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 520" width="100%" height="auto" style="background-color: #0b0f17; border-radius: 12px; border: 1px solid #1e293b; font-family: system-ui, -apple-system, sans-serif;">
  <defs>
    <!-- Gradients for premium styling -->
    <linearGradient id="cli-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0ea5e9" />
      <stop offset="100%" stop-color="#0284c7" />
    </linearGradient>
    <linearGradient id="os-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#64748b" />
      <stop offset="100%" stop-color="#475569" />
    </linearGradient>
    <linearGradient id="server-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d946ef" />
      <stop offset="100%" stop-color="#a21caf" />
    </linearGradient>
    <linearGradient id="db-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#047857" />
    </linearGradient>
    <linearGradient id="auth-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#4f46e5" />
    </linearGradient>
    <linearGradient id="billing-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f43f5e" />
      <stop offset="100%" stop-color="#e11d48" />
    </linearGradient>
    <linearGradient id="anthropic-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f97316" />
      <stop offset="100%" stop-color="#ea580c" />
    </linearGradient>
    <linearGradient id="openai-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#059669" />
      <stop offset="100%" stop-color="#047857" />
    </linearGradient>

    <!-- Markers for clean arrows -->
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 10 5 L 0 8.5 z" fill="#64748b" />
    </marker>
    <marker id="arrow-active" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 10 5 L 0 8.5 z" fill="#38bdf8" />
    </marker>
  </defs>

  <!-- Subgraphs -->
  <!-- Client (Local Host) -->
  <rect x="30" y="30" width="260" height="460" rx="8" fill="none" stroke="#334155" stroke-dasharray="4 4" stroke-width="1.5" />
  <text x="45" y="55" fill="#94a3b8" font-size="12px" font-weight="bold" letter-spacing="1">CLIENT (LOCAL HOST)</text>

  <!-- Cloud Backend -->
  <rect x="320" y="30" width="340" height="460" rx="8" fill="none" stroke="#334155" stroke-dasharray="4 4" stroke-width="1.5" />
  <text x="335" y="55" fill="#94a3b8" font-size="12px" font-weight="bold" letter-spacing="1">CLOUD BACKEND</text>

  <!-- AI Providers -->
  <rect x="690" y="30" width="260" height="460" rx="8" fill="none" stroke="#334155" stroke-dasharray="4 4" stroke-width="1.5" />
  <text x="705" y="55" fill="#94a3b8" font-size="12px" font-weight="bold" letter-spacing="1">AI PROVIDERS (LLM)</text>

  <!-- Connection Lines (Underneath nodes) -->
  <!-- CLI -> OS -->
  <path d="M 160 160 L 160 360" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)" />
  <text x="170" y="265" fill="#94a3b8" font-size="11px">executeLocalTool()</text>

  <!-- CLI <--> Server -->
  <path d="M 270 120 L 380 120" stroke="#38bdf8" stroke-width="2" marker-start="url(#arrow-active)" marker-end="url(#arrow-active)" />
  <text x="325" y="110" fill="#38bdf8" font-size="11px" font-weight="bold" text-anchor="middle">Hono Client (SSE / JSON)</text>

  <!-- Server -> Clerk -->
  <path d="M 410 160 L 410 220" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)" />
  <text x="405" y="195" fill="#94a3b8" font-size="10px" text-anchor="end">Authenticate Request</text>

  <!-- Server -> Polar -->
  <path d="M 570 160 L 570 220" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)" />
  <text x="575" y="195" fill="#94a3b8" font-size="10px" text-anchor="start">Meter AI Usage</text>

  <!-- Server <--> DB -->
  <path d="M 490 160 L 490 360" stroke="#38bdf8" stroke-width="2" marker-start="url(#arrow-active)" marker-end="url(#arrow-active)" />
  <text x="495" y="315" fill="#38bdf8" font-size="11px" font-weight="bold">Prisma ORM</text>

  <!-- Server <--> Anthropic -->
  <path d="M 600 105 L 710 105" stroke="#38bdf8" stroke-width="2" marker-start="url(#arrow-active)" marker-end="url(#arrow-active)" />
  <text x="655" y="95" fill="#38bdf8" font-size="11px" font-weight="bold" text-anchor="middle">Vercel AI SDK</text>

  <!-- Server <--> OpenAI -->
  <path d="M 600 135 C 650 135, 650 400, 710 400" fill="none" stroke="#38bdf8" stroke-width="2" marker-start="url(#arrow-active)" marker-end="url(#arrow-active)" />
  <text x="655" y="275" fill="#38bdf8" font-size="11px" font-weight="bold" text-anchor="middle">Vercel AI SDK</text>

  <!-- Nodes (Top layer) -->
  <!-- CLI -->
  <g>
    <rect x="50" y="80" width="220" height="80" rx="6" fill="url(#cli-grad)" stroke="#38bdf8" stroke-width="1" />
    <text x="160" y="115" fill="#ffffff" font-size="14px" font-weight="bold" text-anchor="middle">packages/cli</text>
    <text x="160" y="135" fill="#e0f2fe" font-size="11px" text-anchor="middle">(React + OpenTUI)</text>
  </g>

  <!-- OS -->
  <g>
    <rect x="50" y="360" width="220" height="80" rx="6" fill="url(#os-grad)" stroke="#475569" stroke-width="1" />
    <text x="160" y="395" fill="#ffffff" font-size="14px" font-weight="bold" text-anchor="middle">Local OS &amp; Filesystem</text>
    <text x="160" y="415" fill="#f1f5f9" font-size="11px" text-anchor="middle">Tool Execution Host</text>
  </g>

  <!-- Server -->
  <g>
    <rect x="380" y="80" width="220" height="80" rx="6" fill="url(#server-grad)" stroke="#f0abfc" stroke-width="1" />
    <text x="490" y="115" fill="#ffffff" font-size="14px" font-weight="bold" text-anchor="middle">packages/server</text>
    <text x="490" y="135" fill="#fdf4ff" font-size="11px" text-anchor="middle">(Hono + Bun)</text>
  </g>

  <!-- Clerk -->
  <g>
    <rect x="340" y="220" width="140" height="60" rx="6" fill="url(#auth-grad)" stroke="#818cf8" stroke-width="1" />
    <text x="410" y="248" fill="#ffffff" font-size="12px" font-weight="bold" text-anchor="middle">Clerk Auth</text>
    <text x="410" y="264" fill="#e0e7ff" font-size="10px" text-anchor="middle">OAuth Providers</text>
  </g>

  <!-- Polar -->
  <g>
    <rect x="500" y="220" width="140" height="60" rx="6" fill="url(#billing-grad)" stroke="#fda4af" stroke-width="1" />
    <text x="570" y="248" fill="#ffffff" font-size="12px" font-weight="bold" text-anchor="middle">Polar Billing</text>
    <text x="570" y="264" fill="#ffe4e6" font-size="10px" text-anchor="middle">Usage &amp; Credits</text>
  </g>

  <!-- DB -->
  <g>
    <rect x="380" y="360" width="220" height="80" rx="6" fill="url(#db-grad)" stroke="#34d399" stroke-width="1" />
    <text x="490" y="395" fill="#ffffff" font-size="14px" font-weight="bold" text-anchor="middle">PostgreSQL Database</text>
    <text x="490" y="415" fill="#ecfdf5" font-size="11px" text-anchor="middle">(Neon + Prisma ORM)</text>
  </g>

  <!-- Anthropic -->
  <g>
    <rect x="710" y="80" width="220" height="80" rx="6" fill="url(#anthropic-grad)" stroke="#ffedd5" stroke-width="1" />
    <text x="820" y="115" fill="#ffffff" font-size="14px" font-weight="bold" text-anchor="middle">Anthropic API</text>
    <text x="820" y="135" fill="#fff7ed" font-size="11px" text-anchor="middle">Claude Models</text>
  </g>

  <!-- OpenAI -->
  <g>
    <rect x="710" y="360" width="220" height="80" rx="6" fill="url(#openai-grad)" stroke="#a7f3d0" stroke-width="1" />
    <text x="820" y="395" fill="#ffffff" font-size="14px" font-weight="bold" text-anchor="middle">OpenAI API</text>
    <text x="820" y="415" fill="#ecfdf5" font-size="11px" text-anchor="middle">GPT Models</text>
  </g>
</svg>
